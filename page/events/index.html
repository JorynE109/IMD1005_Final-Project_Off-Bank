<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Off-Bank Events</title>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="stylesheet" href="https://use.typekit.net/kxt1gte.css">
    <link rel="stylesheet" href="https://meyerweb.com/eric/tools/css/reset/reset.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/events.css">
</head>
<body>
    <header>
        <img class="logo" src="/img/logo.svg">
    </header>
    <div id="wrapper">
        <nav>
            <div id="mobileHeader">
                <div id="mobileNav">
                    <div id="mobileNavToggleContainer">
                        <button type="button" id="mobileNavToggle" onclick="toggleMobileLinks()">=</button>
                        <p>[E]</p>
                    </div>
                    <div id="mobileLinksContainer">
                        <a href="/">Home <span>[H]</span></a>
                        <a href="/page/posts/">Posts <span>[P]</span></a>
                        <a href="/page/about/">About <span>[A]</span></a>
                    </div>
                </div>
                <p id="pageDisplay">Home</p>
            </div>
            <div id="widescreenNav">
                <!-- the spans gotta be switched for icons, keep class the same -->
                <a href="/" class="active"><span class="navtitle">Home</span><span class="navicon">[H]</span></a>
                <a href="/page/posts/"><span class="navtitle">Posts</span><span class="navicon">[P]</span></a>
                <a href="/page/events/"><span class="navtitle">Events</span><span class="navicon">[E]</span></a>
                <a href="/page/about/"><span class="navtitle">About</span><span class="navicon">[A]</span></a>
            </div>
        </nav>
        <main>
            <h1>Events</h1>
            <div id="viewSelectionHolder">
                <p>Select View</p>
                <div class="selectButtonDiv">
                    <button id="viewSelect" class="viewSelect" onclick="populateCalDiv(1)">List</button>
                    <button id="viewSelect" class="viewSelect" onclick="populateCalDiv(0)">Calendar</button>
                </div>
            </div>
            <div id="eventsCalendar">
                <div id="eventsCalHead">
                    <div class="calMonthSelectDiv">
                        <div class="monthYearDisplay">
                            <h2 id="calHeading">Month</h2>
                            <p id="yearText">Year</p>
                        </div>
                        <div id="monthSelectButtonsHolder">
                            <button id="monthSelect" class="monthSelect arrow" onclick="changeMonth(-1)"><</button>
                            <button id="monthSelect" class="monthSelect" onclick="changeMonth(0)">Current</button>
                            <button id="monthSelect" class="monthSelect arrow" onclick="changeMonth(1)">></button>
                        </div>
                    </div>
                    <div id="calendarDisplay"></div>
                    <div id="eventsList"></div>
                </div>
            </div>
            <button onclick="topFunction()" id="myBtn" title="Go to top">^</button>
        </main>
    </div>
    <script src="/js/main.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/events.js"></script>
</body>
</html>
