<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Off-Bank Posts</title>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="stylesheet" href="https://use.typekit.net/kxt1gte.css">
    <link rel="stylesheet" href="https://use.typekit.net/kxt1gte.css">
    <link rel="stylesheet" href="https://meyerweb.com/eric/tools/css/reset/reset.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/posts.css">
</head>
<body>
    <header>
        <img class="logo" src="/img/logo.svg">
    </header>
    <div id="wrapper">
        <nav>
            <div id="mobileHeader">
                <div id="mobileNav">
                    <div id="mobileNavToggleContainer">
                        <button type="button" id="mobileNavToggle" onclick="toggleMobileLinks()">=</button>
                        <p>[P]</p>
                    </div>
                    <div id="mobileLinksContainer">
                        <a href="/">Home <span>[H]</span></a>
                        <a href="/page/events/">Events <span>[E]</span></a>
                        <a href="/page/about/">About <span>[A]</span></a>
                    </div>
                </div>
                <p id="pageDisplay">Home</p>
            </div>
            <div id="widescreenNav">
                <!-- the spans gotta be switched for icons, keep class the same -->
                <a href="/" class="active"><span class="navtitle">Home</span><span class="navicon">[H]</span></a>
                <a href="/page/posts/"><span class="navtitle">Posts</span><span class="navicon">[P]</span></a>
                <a href="/page/events/"><span class="navtitle">Events</span><span class="navicon">[E]</span></a>
                <a href="/page/about/"><span class="navtitle">About</span><span class="navicon">[A]</span></a>
            </div>
        </nav>
        <main>
            <h1>Articles</h1>
            
            <div id="searchBarHolder">
                <form>
                    <input type="text" id="search">
                    <button type="submit" onclick="searchItems()">Search</button>
                </form>
            </div>
            <div class="categorySelectionHolder">
                <button onclick="productSelected('all')" class="categorySelection">All</button>
                <button onclick="productSelected('article')" class="categorySelection">Articles</button>
                <button onclick="productSelected('artist')" class="categorySelection">Artists</button>
                <button onclick="productSelected('album')" class="categorySelection">Albums</button>
                <button onclick="productSelected('venue')" class="categorySelection">Venues</button>
            </div>

            <div id="postsHolder"></div>
        </main>
    </div>
    <script src="/js/main.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/posts.js"></script>
</body>
</html>
