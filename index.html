<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Off-Bank Home</title>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="stylesheet" href="https://use.typekit.net/kxt1gte.css">
    <link rel="stylesheet" href="https://use.typekit.net/kxt1gte.css">
    <link rel="stylesheet" href="https://meyerweb.com/eric/tools/css/reset/reset.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<style>
body {
background-image: url('http://dl.glitter-graphics.net/pub/1266/1266351qt3o24sx4a.jpg');
background-attachment: fixed;
background-repeat: repeat;
}
</style>
<body>
    <header>
        <a href="/" class="logo"><img src="/img/logo.svg"></a>
    </header>
    <div id="wrapper">
        <nav>
            <div id="mobileHeader">
                <div id="mobileNav">
                    <div id="mobileNavToggleContainer">
                        <button type="button" id="mobileNavToggle" onclick="toggleMobileLinks()">=</button>
                        <p>[H]</p>
                    </div>
                    <div id="mobileLinksContainer">
                        <a href="/page/posts/">Posts <img src="/img/icon/icons8-article.svg"></a>
                        <a href="/page/events/">Events <img src="/img/icon/icons8-calendar-24.png"></a>
                        <a href="/page/about/">About <img src="/img/icon/icons8-smile-24.png"></a>
                    </div>
                </div>
                <p id="pageDisplay">Home</p>
            </div>
            <div id="widescreenNav">
                <!-- the spans gotta be switched for icons, keep class the same -->
                <a href="#" class="active"><span class="navtitle">Home</span><img class="navicon" src="/img/icon/icons8-home.svg"></a>
                <a href="/page/posts/"><span class="navtitle">Posts</span><img class="navicon" src="/img/icon/icons8-article.svg"></a>
                <a href="/page/events/"><span class="navtitle">Events</span><img class="navicon" src="/img/icon/icons8-calendar-24.png"></a>
                <a href="/page/about/"><span class="navtitle">About</span><img class="navicon" src="/img/icon/icons8-smile-24.png"></a>
            </div>
        </nav>
        <main>
            <section class="hero">
                <h1>OFF-BANK</h1>
                <p>Ottawa’s underground music scene</p>
            </section>
            <section id="news">
                <h2>News</h2>
                <sub>Stay caught up on upcoming events</sub>
                <div id="newsDisplay"></div>
            </section>
            <section id="recentPosts">
                <h2>Recent Posts</h2>
                <div id="recentPostsDisplay"></div>
            </section>
            <section id="artistHighlight">
                <h2>Artist Highlight</h2>
                <sub>Here’s an artist we want to highlight</sub>
                <div id="artistHighlightDisplay"></div>
            </section>
        </main>
        
    </div>
    <footer>
        <img src="/img/logo-lg.png">
        <div id="footerText">
            <a href="/">Home</a>
            <a href="/page/posts/">Posts</a>
            <a href="/page/events/">Events</a>
            <a href="/page/about/">About</a>
            <p><a target="_blank" href="https://icons8.com/icons/all--style-material-sharp">Icons</a>by<a target="_blank" href="https://icons8.com">Icons8</a></p>
        </div>
    </footer>
    <script src="js/main.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
