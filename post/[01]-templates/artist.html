<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Review</title>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="stylesheet" href="https://use.typekit.net/kxt1gte.css">
    <link rel="stylesheet" href="https://meyerweb.com/eric/tools/css/reset/reset.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/article.css">
</head>
<body>
    <header>
        <img class="logo" src="/img/logo.svg">
    </header>
    <div id="wrapper">
        <nav>
        </nav>
        <main>
            <div class="articleContent">
                <h1>Artist Name</h1>
                <div class="imgDisp">    
                    <img src="">
                </div>
                <div class="infoText">
                    <p class="genre"></p>
                    <p class="locale">Ottawa</p>
                    
                </div>
                <div class="review unreviewed">
                    <h2>Unreviewed</h2>
                    <p>This page exists to collect information while a written review is pending</p>
                </div>
                <div id="upcomingShows" data-artist="taxi girls"></div>
            </div>
            <div class="sidebar">
                <section id="posts">
                    <h2>Recent Articles</h2>
                    <div id="recentPostsDisplay"></div>
                </section>
                <section id="events">
                    <h2>Upcoming Events</h2>
                    <div id="newsDisplay"></div>
                </section>
                <section id="artist">
                    <h2>Highlighted Artist</h2>
                    <div id="artistHighlightDisplay"></div>
                </section>
            </div>
        </main>
    </div>
    <footer>
    </footer>
    <script src="/js/main.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/artist-shows.js"></script>
</body>
</html>
