<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Off-Bank Posts</title>
    <link rel="icon" type="image/x-icon" href="../img/favicon.ico">
    <link rel="stylesheet" href="https://use.typekit.net/kxt1gte.css">
    <link rel="stylesheet" href="https://meyerweb.com/eric/tools/css/reset/reset.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/posts.css">
</head>
<style>
body {
background-image: url('http://dl.glitter-graphics.net/pub/1266/1266351qt3o24sx4a.jpg');
background-attachment: fixed;
background-repeat: repeat;
}
</style>
<body>
    <header>
        <a href="../" class="logo"><img class="logoImg" src="../img/logo.png"></a>
    </header>
    <div id="wrapper">
        <nav>
            <div id="mobileHeader">
                <div id="mobileNav">
                    <div id="mobileNavToggleContainer">
                        <button type="button" id="mobileNavToggle" onclick="toggleMobileLinks()">=</button>
                        <p>[P]</p>
                    </div>
                    <div id="mobileLinksContainer">
                        <a href="../">Home <span>[H]</span></a>
                        <a href="../events/">Events <span>[E]</span></a>
                        <a href="../about/">About <span>[A]</span></a>
                    </div>
                </div>
                <p id="pageDisplay">Home</p>
            </div>
            <div id="widescreenNav">
                <!-- the spans gotta be switched for icons, keep class the same -->
                <a href="../" class="active"><span class="navtitle">Home</span><span class="navicon">[H]</span></a>
                <a href="../posts/"><span class="navtitle">Posts</span><span class="navicon">[P]</span></a>
                <a href="../events/"><span class="navtitle">Events</span><span class="navicon">[E]</span></a>
                <a href="../about/"><span class="navtitle">About</span><span class="navicon">[A]</span></a>
            </div>
        </nav>
        <main>
            <h1>Articles</h1>
            
            <div id="searchBarHolder">
                <form>
                    <input type="text" id="search">
                    <button>Search</button>
                </form>
            </div>
            <div class="categorySelectionHolder">
                <button onclick="productSelected('all')" class="categorySelection">All</button>
                <button onclick="productSelected('article')" class="categorySelection">Articles</button>
                <button onclick="productSelected('artist')" class="categorySelection">Artists</button>
                <button onclick="productSelected('album')" class="categorySelection">Albums</button>
                <button onclick="productSelected('venue')" class="categorySelection">Venues</button>
            </div>

            <div id="postsHolder">
                <div id="loadingDisp">
                    <img class="loadingGIF"
                        srcset="../img/icon/loading/loading-24.gif 24w,
                            /img/icon/loading/loading-48.gif 48w,
                            /img/icon/loading/loading-72.gif 72w,
                            /img/icon/loading/loading-96.gif 96w,"
                        sizes="(width <= 24px) 24w,
                                (width <= 48px) 48w,
                                (width <= 72px) 72w,
                                96w"
                        src="../img/icon/loading/loading-96.gif"
                        alt="loading gif"../>
                    <h2>Loading Posts</h2>
                </div>
            </div>
            <button onclick="topFunction()" id="myBtn" style="display: none;" title="Go to top">^</button>
        </main>
    </div>
    <footer>
        <img src="../img/logo-lg.png">
        <div id="footerText">
            <a href="../">Home</a>
            <a href="../posts/">Posts</a>
            <a href="../events/">Events</a>
            <a href="../about/">About</a>
            <p><a target="_blank" href="https://icons8.com/icons/all--style-material-sharp">Icons</a>by<a target="_blank" href="https://icons8.com">Icons8</a></p>
        </div>
    </footer>
    <script src="../js/main.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/posts.js"></script>
</body>
</html>
